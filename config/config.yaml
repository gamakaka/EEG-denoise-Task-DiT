project:
  name: JNE
  seed: 8888
  device: cuda:3

data:
  train_path: ../data/eeg_train_data.npy
  test_rest_path: ../data/eeg_test_rest.npy
  test_motion_path: ../data/eeg_test_motion.npy
  val_ratio: 0.2
  split_seed: 42
  num_workers: 8

model:
  name: timemixer
  feats: 64
  eps_scaler: 1.0
  fusion_type: fusion1
  task_condition: true
  spectral_prototype_path: data/spectral_prototypes.pt
  prototype_cond_dim: 64
  num_classes: 2
  condition_residual_scale: 0.1

train:
  epochs: 1000
  batch_size: 512
  lr: 0.0003
  grad_clip: 1.0
  save_epoch_checkpoints: false
  early_stop_patience: 80
  min_delta: 0.001
  scheduler_step_size: 1500
  scheduler_gamma: 0.1
  lambda_content: 0.005
  lambda_style: 0.001
  encoder_ckpt_path: comparisons/outputs/rescnn1d/unconditional/checkpoints/best_encoder.pt

eval:
  batch_size: 256
  sampler: ddim
  ddim_num_steps: 20
  ddim_eta: 0.0
  save_denoised: true
  save_figures: true
  figure_interval: 10

diffusion:
  beta_start: 0.0001
  beta_end: 0.02
  q_num_steps: 1000
  schedule: linear

output:
  checkpoint_root: check_points
  log_root: logs
  result_root: results
